# Railway Config — HSLM Training (default for all services)
# Training services use Dockerfile.hslm-train entrypoint
# px-bridge service overrides via serviceInstanceUpdate API

[build]
builder = "DOCKERFILE"
dockerfilePath = "deploy/Dockerfile.hslm-train"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
# startCommand MUST be null - use Dockerfile ENTRYPOINT instead
