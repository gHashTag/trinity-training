app = "hslm-w9-mini"
primary_region = "sin"

[build]
dockerfile = "Dockerfile.hslm-train"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1

[[http_service.checks]]
grace_period = "180s"
interval = "60s"
method = "GET"
path = "/health"
timeout = "30s"

[[vm]]
cpu_kind = "shared"
cpus = 2
memory_mb = 4096

[env]
HSLM_PROFILE = "s3-multiobj"
HSLM_CTX = "81"
HSLM_NTP_WEIGHT = "0.50"
HSLM_JEPA_WEIGHT = "0.25"
HSLM_NCA_WEIGHT = "0.25"
HSLM_CRASH_TOLERANCE = "0.05"
HSLM_WAVE = "9"
HSLM_LR = "1e-3"
HSLM_LR_SCHEDULE = "cosine"
HSLM_OPTIMIZER = "lamb"
HSLM_BATCH = "66"
HSLM_STEPS = "100000"
HSLM_WARMUP = "2000"
HSLM_WD = "0.01"
HSLM_GRAD_CLIP = "1.0"
HSLM_FRESH = "0"
